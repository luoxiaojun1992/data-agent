# DataAgent Development Environment
# Phase 1 (P1): All infrastructure services for local development.

services:
  mongodb:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand('ping').ok"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    restart: always
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd-data:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  milvus:
    image: milvusdb/milvus:v2.5.9
    command: milvus run standalone
    environment:
      ETCD_ENDPOINTS: etcd:2379
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus-data:/var/lib/milvus
    depends_on:
      etcd:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

  seaweedfs:
    image: chrislusf/seaweedfs
    ports:
      - "9333:9333"
      - "8081:8080"
    command: server -master -filer -dir=/data
    volumes:
      - seaweedfs-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9333/cluster/status"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  vault:
    image: vault:1.18
    ports:
      - "8200:8200"
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=dev-root-token
      - VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 10s
      timeout: 5s
      retries: 10

  mockllm:
    build:
      context: mockllm
      dockerfile: Dockerfile
    image: data-agent-mockllm:latest
    ports:
      - "8082:8082"
    environment:
      REDIS_ADDR: redis:6379
      MOCKLLM_PORT: "8082"
      MOCK_ADMIN_TOKEN: test-admin-token
      MOCK_CHUNK_DELAY_MS: "5"
      MOCK_DEFAULT_REPLY: "Mock LLM: please inject test response"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  data-agent:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - MONGO_URI=mongodb://mongodb:27017
      - REDIS_ADDR=redis:6379
      - MILVUS_ADDR=milvus:19530
      - SEAWEEDFS_MASTER=http://seaweedfs:9333
      - SEAWEEDFS_FILER=http://seaweedfs:8080
      - LLM_BASE_URL=http://mockllm:8082
      - LLM_API_KEY=test-key
      - LLM_MODEL=mock-gpt-4o
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      milvus:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
      vault:
        condition: service_healthy
      mockllm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://data-agent:8080
    depends_on:
      data-agent:
        condition: service_healthy

volumes:
  etcd-data:
  mongodb-data:
  milvus-data:
  seaweedfs-data:
