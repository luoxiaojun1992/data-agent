name: UI Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ui-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cleanup previous containers
        run: |
          docker compose -f docker-compose.ui-test.yml down --remove-orphans --volumes 2>/dev/null || true

      - name: Build Docker images
        run: |
          docker compose -f docker-compose.ui-test.yml build --no-cache 2>&1

      - name: Run services + E2E tests
        run: |
          docker compose -f docker-compose.ui-test.yml up --abort-on-container-exit --exit-code-from ui-e2e 2>&1

      - name: Show service logs (on failure)
        if: failure()
        run: |
          echo "=== data-agent logs ==="
          docker compose -f docker-compose.ui-test.yml logs data-agent 2>/dev/null || true
          echo "=== frontend logs ==="
          docker compose -f docker-compose.ui-test.yml logs frontend 2>/dev/null || true
          echo "=== ui-e2e logs ==="
          docker compose -f docker-compose.ui-test.yml logs ui-e2e 2>/dev/null || true
          echo "=== service status ==="
          docker compose -f docker-compose.ui-test.yml ps 2>/dev/null || true

      - name: Cleanup containers
        if: always()
        run: |
          docker compose -f docker-compose.ui-test.yml down --remove-orphans --volumes 2>/dev/null || true

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: tests/ui/artifacts/allure-results/
          retention-days: 7
          if-no-files-found: warn
