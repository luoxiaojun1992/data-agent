name: UI Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ui-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cleanup previous containers
        run: |
          docker compose -f docker-compose.ui-test.yml down --remove-orphans --volumes 2>/dev/null || true

      - name: Setup Docker Compose
        id: compose
        run: |
          docker compose -f docker-compose.ui-test.yml up -d --wait || true
          echo "compose_exit=$?" >> $GITHUB_OUTPUT

      - name: Show data-agent logs
        if: always()
        run: |
          docker compose -f docker-compose.ui-test.yml logs data-agent 2>/dev/null || true
          docker compose -f docker-compose.ui-test.yml ps 2>/dev/null || true

      - name: Fail if compose failed
        if: steps.compose.outputs.compose_exit != '0'
        run: exit 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright Dependencies
        run: |
          cd tests/ui
          npm ci
          npx playwright install chromium --with-deps

      - name: Run E2E Tests
        run: |
          cd tests/ui
          npx playwright test --reporter=allure-playwright

      - name: Cleanup containers
        if: always()
        run: |
          docker compose -f docker-compose.ui-test.yml down --remove-orphans --volumes 2>/dev/null || true

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: tests/ui/allure-results/
          retention-days: 7
