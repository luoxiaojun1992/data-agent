name: Lint Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  golangci-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          golangci-lint run ./... --timeout=5m

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck -show verbose ./... 2>&1 | tee govulncheck.log
          # Allow indirect-dependency vulns that don't affect runtime
          # quic-go/http3 vulns are from gin indirect dep — not in our HTTP stack
          if grep -q "Vulnerability #" govulncheck.log; then
            echo "::warning::govulncheck found vulnerabilities — check log"
          fi
        continue-on-error: true

  sonarqube:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run SonarQube Scanner
        id: scan
        run: docker compose -f docker-compose-sonar-check.yml up --abort-on-container-exit --exit-code-from sonar-scanner sonar-scanner

      - name: Quality Gate — Blockers & Criticals
        if: always()
        run: |
          echo "=== SonarQube Quality Gate ==="
          REPORT="scanner-report/sonar-issues.json"
          if [ ! -f "$REPORT" ]; then
            echo "WARNING: No SonarQube report found — skipping gate"
            exit 0
          fi
          python3 tests/ci/sonar-quality-gate.py "$REPORT"
      - name: Upload SonarQube Report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sonar-report
          path: scanner-report/
          if-no-files-found: warn

      - name: Teardown SonarQube
        if: always()
        run: docker compose -f docker-compose-sonar-check.yml down -v
