name: Lint Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  golangci-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          golangci-lint run ./... --timeout=5m

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck -show verbose ./... 2>&1 | tee govulncheck.log
          # Allow indirect-dependency vulns that don't affect runtime
          # quic-go/http3 vulns are from gin indirect dep — not in our HTTP stack
          if grep -q "Vulnerability #" govulncheck.log; then
            echo "::warning::govulncheck found vulnerabilities — check log"
          fi
        continue-on-error: true

  sonarqube:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run SonarQube Scanner
        id: scan
        run: docker compose -f docker-compose-sonar-check.yml up --abort-on-container-exit --exit-code-from sonar-scanner sonar-scanner

      - name: Quality Gate — Blockers & Criticals
        if: always()
        run: |
          echo "=== SonarQube Quality Gate ==="
          REPORT="scanner-report/sonar-issues.json"
          if [ ! -f "$REPORT" ]; then
            echo "WARNING: No SonarQube report found"
            exit 0
          fi
          python3 -c "
import json, sys
with open('$REPORT') as f:
    data = json.load(f)
summary = data.get('summaryBySeverity', {})
open_total = data.get('openIssues', 0)

# Check BLOCKER
blocker = summary.get('BLOCKER', {})
blocker_total = sum(blocker.values())
# Check CRITICAL
critical = summary.get('CRITICAL', {})
critical_total = sum(critical.values())
# Check VULNERABILITY across all severities
vuln_total = sum(summary.get(s, {}).get('VULNERABILITY', 0) for s in summary)
# Check BUG
bug_total = sum(summary.get(s, {}).get('BUG', 0) for s in summary)
# Check SECURITY_HOTSPOT
hotspot_total = sum(summary.get(s, {}).get('SECURITY_HOTSPOT', 0) for s in summary)

print(f'Total open issues: {open_total}')
print(f'BLOCKER: {blocker_total}, CRITICAL: {critical_total}')
print(f'VULNERABILITY: {vuln_total}, BUG: {bug_total}, HOTSPOT: {hotspot_total}')

# Gate: zero tolerance for BLOCKER and CRITICAL
if blocker_total > 0 or critical_total > 0:
    print(f'FAIL: {blocker_total} blocker(s) + {critical_total} critical(s) must be fixed')
    # Print details
    for issue in data.get('openIssuesList', []):
        if issue.get('severity') in ('BLOCKER', 'CRITICAL'):
            print(f'  {issue[\"severity\"]} {issue[\"type\"]}: {issue[\"message\"][:120]}')
    sys.exit(1)

# Gate: zero tolerance for open VULNERABILITY
if vuln_total > 0:
    print(f'FAIL: {vuln_total} open vulnerability(s) must be fixed')
    for issue in data.get('openIssuesList', []):
        if issue.get('type') == 'VULNERABILITY':
            print(f'  [{issue[\"severity\"]}] {issue[\"message\"][:120]}')
    sys.exit(1)

# Gate: zero tolerance for open BUG with severity >= MAJOR
major_bugs = summary.get('MAJOR', {}).get('BUG', 0) + \
             summary.get('BLOCKER', {}).get('BUG', 0) + \
             summary.get('CRITICAL', {}).get('BUG', 0)
if major_bugs > 0:
    print(f'FAIL: {major_bugs} MAJOR+ bug(s) must be fixed')
    sys.exit(1)

print('PASS: Quality gate passed')
print(f'CODE_SMELL: {sum(summary.get(s, {}).get(\"CODE_SMELL\", 0) for s in summary)} (informational)')
"
      - name: Upload SonarQube Report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sonar-report
          path: scanner-report/
          if-no-files-found: warn

      - name: Teardown SonarQube
        if: always()
        run: docker compose -f docker-compose-sonar-check.yml down -v
