name: Go Unit Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go-ut:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run Tests with Coverage
        run: |
          go test -race -gcflags=all=-l -count=1 -coverprofile=coverage.out ./internal/... ./skills/...

      - name: Coverage Gate
        run: |
          echo "=== Per-Package Coverage ==="
          go tool cover -func=coverage.out | awk '
            $NF ~ /%/ && $0 !~ /total/ {
              gsub("%","",$NF); printf "%6.1f%%  %s\n", $NF+0, $1
            }
          ' | sort -n
          
          # Gate: count packages below 90% (excluding total line and 0% infra)
          FAILING=$(go tool cover -func=coverage.out | awk '
            $0 ~ /total/ { next }
            $NF ~ /%/ { gsub("%","",$NF); if($NF+0 < 90 && $NF+0 > 0) count++ }
            END { print count+0 }
          ')
          
          echo "=== Gate Check ==="
          if [ "$FAILING" -gt 0 ]; then
            echo "ERROR: $FAILING functions below 90% coverage!"
            go tool cover -func=coverage.out | awk '
              $0 ~ /total/ { next }
              $NF ~ /%/ { gsub("%","",$NF); if($NF+0 < 90 && $NF+0 > 0) print "  FAIL:", $NF"%", $1 }
            '
            exit 1
          fi
          echo "PASS: All tested functions >= 90% coverage"

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage-report
          path: coverage.out
          retention-days: 7
          if-no-files-found: warn
