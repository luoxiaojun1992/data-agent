name: Go Unit Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go-ut:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Run Tests with Coverage
        run: |
          go test -race -gcflags=all=-l -count=1 -coverprofile=coverage.out \
            -coverpkg=./internal/adk/...,./internal/api/...,./internal/config/...,./internal/domain/...,./internal/logic/...,./internal/service/... \
            ./internal/...

      - name: Coverage Gate
        run: |
          TOTAL=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${TOTAL}%"
          if (( $(echo "$TOTAL < 96" | bc -l) )); then
            echo "ERROR: Coverage ${TOTAL}% below 96% threshold"
            exit 1
          fi
          echo "PASS: Coverage ${TOTAL}% >= 96%"

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage-report
          path: coverage.out
          retention-days: 7
          if-no-files-found: warn
