name: Go Unit Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go-ut:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      # L1+L2 only: excludes L3 infra (mongo, redis, qdrant, seaweedfs, vault, queue, worker, scheduler)
      - name: Run Unit Tests
        run: |
          go test -race -gcflags=all=-l -coverprofile=coverage.out \
            -coverpkg=./internal/api/...,./internal/config/...,./internal/domain/...,./internal/logic/...,./internal/service/...,./skills/... \
            ./internal/... ./skills/...

      - name: Check Coverage Threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 85" | bc -l) )); then
            echo "ERROR: Coverage ${COVERAGE}% below 85% minimum threshold"
            exit 1
          fi
          echo "Coverage check passed (>= 85%). Target: 98%"

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage-report
          path: coverage.out
          retention-days: 7
          if-no-files-found: warn
