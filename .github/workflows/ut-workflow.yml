name: Go Unit Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go-ut:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run Unit Tests with Coverage
        run: |
          # Run all tests and collect per-package coverage
          go test -race -gcflags=all=-l -count=1 -coverprofile=coverage.out ./internal/... ./skills/...

      - name: Calculate Coverage
        run: |
          echo "=== Coverage by function ==="
          go tool cover -func=coverage.out | tail -20
          
          # Calculate total from the profile
          TOTAL=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${TOTAL}%"
          echo "TOTAL_COVERAGE=${TOTAL}" >> $GITHUB_ENV

      - name: Check Coverage Per-Package
        run: |
          echo "=== Per-package coverage ==="
          go tool cover -func=coverage.out | awk '{
            if ($NF ~ /%/) {
              cov=$NF; gsub("%","",cov); pkg=$1
              print sprintf("%6.1f%% %s", cov+0, pkg)
            }
          }' | grep -v "^  0.0%" | sort -n
          
          # Check if any package is below threshold
          LOW=$(go tool cover -func=coverage.out | awk '
            $NF ~ /total/ { next }
            $NF ~ /%/ { gsub("%","",$NF); if($NF+0 < 80 && $NF+0 > 0) print $1, $NF"%" }')
          if [ -n "$LOW" ]; then
            echo "WARNING: Packages below 80%:"
            echo "$LOW"
          fi

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage-report
          path: coverage.out
          retention-days: 7
          if-no-files-found: warn
