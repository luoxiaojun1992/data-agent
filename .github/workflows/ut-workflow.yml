name: Go Unit Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go-ut:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Run Tests with Coverage
        run: |
          # Exclude /mocks packages from coverage: they are auto-generated test
          # helpers with no tests of their own and would unfairly drag down the
          # aggregate coverage percentage (SPEC-055 introduced many mocks).
          # Keep the original coverpkg scope (adk/api/config/domain/logic/service).
          COVERPKG=$(go list ./internal/adk/... ./internal/api/... ./internal/config/... ./internal/domain/... ./internal/logic/... ./internal/service/... | grep -v '/mocks' | paste -sd, -)
          go test -gcflags=all=-l -p=1 -count=1 -coverprofile=coverage.out \
            -coverpkg="$COVERPKG" \
            ./internal/...

      - name: Coverage Gate
        run: |
          TOTAL=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${TOTAL}%"
          # SPEC-058: coverage gate restored to 98%. The logic/agent orchestrator
          # layer, gin-decoupled chat service, extracted handlers, and enhance
          # service now all have dedicated unit tests. gomonkey is retained
          # (ADK/stdlib) and -race is not restored (gomonkey+race panics).
          if (( $(echo "$TOTAL < 98" | bc -l) )); then
            echo "ERROR: Coverage ${TOTAL}% below 98% threshold"
            exit 1
          fi
          echo "PASS: Coverage ${TOTAL}% >= 98%"

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage-report
          path: coverage.out
          retention-days: 7
          if-no-files-found: warn
