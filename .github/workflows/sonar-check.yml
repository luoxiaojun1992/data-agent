name: Sonar Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sonar-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Start SonarQube
        run: |
          docker compose -f docker-compose.ui-test.yml up -d sonarqube --wait

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: http://localhost:9002
        with:
          args: >
            -Dsonar.projectKey=data-agent
            -Dsonar.projectName=DataAgent
            -Dsonar.sources=.
            -Dsonar.exclusions=**/*_test.go,tests/**,frontend/**
            -Dsonar.go.golangci-lint.reportPaths=golangci-lint-report.xml
