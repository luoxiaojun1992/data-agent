services:
  sonarqube:
    image: sonarqube:community
    ports:
      - "9002:9000"
    environment:
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
    volumes:
      - sonarqube-data:/opt/sonarqube/data
      - sonarqube-logs:/opt/sonarqube/logs
      - sonarqube-extensions:/opt/sonarqube/extensions
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/api/system/status"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  mongodb:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand('ping').ok"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    restart: always
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd-data:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s

  milvus:
    image: milvusdb/milvus:v2.5.9
    command: milvus run standalone
    restart: always
    environment:
      ETCD_ENDPOINTS: etcd:2379
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus-data:/var/lib/milvus
      - ./milvus.yaml:/milvus/configs/milvus.yaml:ro
    depends_on:
      etcd:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 60s

  seaweedfs:
    image: chrislusf/seaweedfs
    ports:
      - "9333:9333"
      - "8081:8080"
    command: server -master -filer -dir=/data
    volumes:
      - seaweedfs-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9333/cluster/status"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  mockllm:
    build:
      context: mockllm
      dockerfile: Dockerfile
    restart: always
    image: data-agent-mockllm:latest
    expose:
      - "8082"
    environment:
      REDIS_ADDR: redis:6379
      MOCKLLM_PORT: "8082"
      MOCK_ADMIN_TOKEN: test-admin-token
      MOCK_CHUNK_DELAY_MS: "5"
      MOCK_DEFAULT_REPLY: "Mock LLM: please inject test response"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  data-agent:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "8080"
    environment:
      - MONGO_URI=mongodb://mongodb:27017
      - REDIS_ADDR=redis:6379
      - MILVUS_ADDR=milvus:19530
      - SEAWEEDFS_MASTER=http://seaweedfs:9333
      - SEAWEEDFS_FILER=http://seaweedfs:8080
      - LLM_BASE_URL=http://mockllm:8082
      - LLM_API_KEY=test-key
      - LLM_MODEL=mock-gpt-4o
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      milvus:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
      sonarqube:
        condition: service_healthy
      mockllm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    expose:
      - "3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://data-agent:8080
    depends_on:
      data-agent:
        condition: service_healthy

  ui-e2e:
    build:
      context: tests/ui
      dockerfile: Dockerfile.e2e
    command: ["bash", "scripts/test-ui-ci.sh"]
    environment:
      - UI_BASE_URL=http://frontend:3000
      - ALLURE_RESULTS_DIR=artifacts/allure-results
    volumes:
      - ./tests/ui/artifacts:/workspace/artifacts
      - ./tests/ui/coverage:/workspace/coverage
    depends_on:
      data-agent:
        condition: service_healthy
      frontend:
        condition: service_started

volumes:
  etcd-data:
  sonarqube-data:
  sonarqube-logs:
  sonarqube-extensions:
  mongodb-data:
  milvus-data:
  seaweedfs-data:
