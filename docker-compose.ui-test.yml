services:
  mongodb:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand('ping').ok"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.18.2
    restart: always
    expose:
      - "6333"
      - "6334"
    volumes:
      - qdrant-data:/qdrant/storage
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test:
        [
          "CMD",
          "bash",
          "-c",
          "exec 3<>/dev/tcp/127.0.0.1/6333 && echo -e 'GET /readyz HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && grep -q 'HTTP/1.1 200' <&3",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s

  seaweedfs:
    image: chrislusf/seaweedfs
    ports:
      - "9333:9333"
      - "8081:8080"
    command: server -master -filer -dir=/data
    volumes:
      - seaweedfs-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9333/cluster/status"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  vault:
    image: hashicorp/vault:1.18
    ports:
      - "8200:8200"
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=dev-root-token
      - VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  mockllm:
    build:
      context: mockllm
      dockerfile: Dockerfile
    restart: always
    image: data-agent-mockllm:latest
    expose:
      - "8082"
    environment:
      REDIS_ADDR: redis:6379
      MOCKLLM_PORT: "8082"
      MOCK_ADMIN_TOKEN: test-admin-token
      MOCK_CHUNK_DELAY_MS: "5"
      MOCK_DEFAULT_REPLY: "Mock LLM: please inject test response"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  data-agent:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "8080"
    environment:
      - MONGO_URI=mongodb://mongodb:27017
      - REDIS_ADDR=redis:6379
      - QDRANT_URL=qdrant:6334
      - SEAWEEDFS_MASTER=http://seaweedfs:9333
      - SEAWEEDFS_FILER=http://seaweedfs:8080
      - LLM_BASE_URL=http://mockllm:8082
      - LLM_API_KEY=test-key
      - LLM_MODEL=mock-gpt-4o
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=dev-root-token
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
      vault:
        condition: service_healthy
      mockllm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://data-agent:8080/api/v1
    expose:
      - "3000"
    depends_on:
      data-agent:
        condition: service_healthy

  ui-e2e:
    build:
      context: tests/ui
      dockerfile: Dockerfile.e2e
    command: ["bash", "scripts/test-ui-ci.sh"]
    environment:
      - UI_BASE_URL=http://frontend:3000
      - ALLURE_RESULTS_DIR=artifacts/allure-results
    volumes:
      - ./tests/ui/artifacts:/workspace/artifacts
      - ./tests/ui/coverage:/workspace/coverage
    depends_on:
      data-agent:
        condition: service_healthy
      frontend:
        condition: service_started

volumes:
  mongodb-data:
  qdrant-data:
  seaweedfs-data:
