# SonarQube CI 环境专用 compose
# 用途：GitHub Actions 中启动 SonarQube + Scanner 对 Go 代码进行静态分析
# 特点：不含业务服务；restart: no（容器执行完即销毁）

services:
  sonarqube:
    image: sonarqube:community
    container_name: da-sonarqube
    ports:
      - "9000:9000"
    volumes:
      - sonarqube-data:/opt/sonarqube/data
      - sonarqube-logs:/opt/sonarqube/logs
      - sonarqube-extensions:/opt/sonarqube/extensions
    networks:
      - sonar-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/api/system/status | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 300s
    restart: "no"

  sonar-scanner:
    build:
      context: ./tests/sonar-scanner
      dockerfile: Dockerfile
    image: data-agent/sonar-scanner:latest
    container_name: da-sonar-scanner
    environment:
      - SONAR_USER=admin
      - SONAR_PASSWORD=admin
      - SONAR_HOST_URL=http://sonarqube:9000
    volumes:
      - .:/usr/src
    working_dir: /usr/src
    command: >
      -Dsonar.projectKey=data-agent
      -Dsonar.sources=cmd,internal
      -Dsonar.exclusions=**/*_test.go,**/*.spec.ts,**/node_modules/**,**/dist/**,**/.workbuddy/**
      -Dsonar.sourceEncoding=UTF-8
    user: root
    networks:
      - sonar-network
    depends_on:
      sonarqube:
        condition: service_healthy
    restart: "no"

volumes:
  sonarqube-data:
  sonarqube-logs:
  sonarqube-extensions:

networks:
  sonar-network:
    driver: bridge
